name: batch

# One matrix cell per (subject, exp, seed): each cell runs a single experiment
# with the full runner budget and uploads a self-contained artifact. Use the
# `cells` input to re-run only specific experiments (e.g. ones that did not
# finish) — see scripts/find_unfinished.py. Timing is NOT a paper result.
on:
  workflow_dispatch:
    inputs:
      seeds:
        description: "Comma-separated seed list (full-run mode)"
        default: "0"
      subjects:
        description: "'all' or comma-separated subject list (full-run mode)"
        default: "all"
      exps:
        description: "Comma-separated experiment list (full-run mode)"
        default: "exp1,exp3"
      cells:
        description: "Targeted re-run: comma list of SUBJECT:exp:seed. Overrides subjects/seeds/exps when set."
        default: ""
      wall_minutes:
        description: "Internal wall-guard budget per experiment (minutes; <355)"
        default: "340"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  WEKA_VERSION: "3.8.6"
  WEKA_URL: "https://repo1.maven.org/maven2/nz/ac/waikato/cms/weka/weka-stable/3.8.6/weka-stable-3.8.6.jar"
  WEKA_SHA256: "932ea2f342b58fe45736389e9c426d5b5955e610d1f5f6485117f532068915e9"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - id: build
        shell: python
        run: |
          import json, os
          all_subjects = ["AT1","AT2","AT51","AT52","AT53","AT54",
                          "AT6A","AT6B","AT6C","AT6ABC",
                          "CC1","CC2","CC3","CC4","CC5","CCX"]
          cells = os.environ["CELLS"].strip()
          include = []
          if cells:
              # Targeted re-run: SUBJECT:exp:seed,SUBJECT:exp:seed,...
              for tok in cells.split(","):
                  tok = tok.strip()
                  if not tok:
                      continue
                  subj, exp, seed = tok.split(":")
                  include.append({"subject": subj, "exp": exp, "seed": int(seed)})
          else:
              seeds = [int(s) for s in os.environ["SEEDS"].split(",") if s.strip()]
              subj_in = os.environ["SUBJECTS"].strip()
              subjects = all_subjects if subj_in == "all" else [s.strip() for s in subj_in.split(",")]
              exps = [e.strip() for e in os.environ["EXPS"].split(",") if e.strip()]
              include = [{"subject": s, "exp": e, "seed": seed}
                         for s in subjects for e in exps for seed in seeds]
          matrix = {"include": include}
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("matrix=" + json.dumps(matrix) + "\n")
          print(f"{len(include)} cells")
          print(json.dumps(matrix, indent=2)[:2000])
        env:
          SEEDS: ${{ inputs.seeds }}
          SUBJECTS: ${{ inputs.subjects }}
          EXPS: ${{ inputs.exps }}
          CELLS: ${{ inputs.cells }}

  run:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 355
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      CELL: ${{ matrix.subject }}_${{ matrix.exp }}_s${{ matrix.seed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install package (pinned deps from pyproject)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fetch Weka (pinned, checksum-verified)
        run: |
          mkdir -p "$HOME/weka"
          curl -fsSL -o "$HOME/weka/weka-stable-${WEKA_VERSION}.jar" "$WEKA_URL"
          echo "${WEKA_SHA256}  $HOME/weka/weka-stable-${WEKA_VERSION}.jar" | sha256sum -c -
          # Weka's package manager needs org.bounce (vendored in third_party/),
          # otherwise J48 dies with NoClassDefFoundError and no tree is produced.
          echo "WEKA_JAR=$HOME/weka/weka-stable-${WEKA_VERSION}.jar:$GITHUB_WORKSPACE/third_party/bounce.jar" >> "$GITHUB_ENV"

      # Resume mechanism: cache ONLY the stable per-experiment verdict cache
      # (not the whole outputs/ tree). The run-id key makes every dispatch save
      # an updated cache; the prefix restore-keys pull the most recent one, so a
      # re-run of a wall-stopped experiment replays solved candidates from cache
      # and advances further each time until it completes.
      - name: Restore verdict cache
        uses: actions/cache@v4
        with:
          path: vcache
          key: diagnosis-vcache-${{ matrix.subject }}-${{ matrix.exp }}-s${{ matrix.seed }}-${{ github.run_id }}
          restore-keys: |
            diagnosis-vcache-${{ matrix.subject }}-${{ matrix.exp }}-s${{ matrix.seed }}-

      - name: Generate this experiment's config
        run: |
          python scripts/gen_batch_configs.py \
            --seeds "${{ matrix.seed }}" \
            --subjects "${{ matrix.subject }}" \
            --exps "${{ matrix.exp }}" \
            --out "configs/${CELL}"

      - name: Run under wall guard (single experiment, full budget)
        run: |
          python scripts/run_batch.py \
            --configs-dir "configs/${CELL}" \
            --wall-minutes "${{ inputs.wall_minutes }}" \
            --workers 1 \
            --cache-dir vcache

      - name: Collect artifact payload
        run: |
          mkdir -p payload
          # report.json, summary.json, run_meta.json, final ARFFs, J48 .out,
          # stopping-check logs. Bulky per-generation dumps are excluded.
          cd outputs && find . -type f \( \
              -name 'report.json' -o -name 'summary.json' -o -name 'run_meta.json' \
              -o -name '*.out' -o -name '*.arff' -o -name 'inference_state.json' \
              -o -name '*stopping*' -o -name 'hypot.txt' \) \
            -exec bash -c 'mkdir -p "../payload/$(dirname "{}")"; cp "{}" "../payload/{}"' \;

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: diagnosis-run-${{ matrix.subject }}-${{ matrix.exp }}-s${{ matrix.seed }}
          path: payload
          retention-days: 30
          if-no-files-found: warn
