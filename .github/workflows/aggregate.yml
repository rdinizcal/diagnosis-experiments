name: aggregate

# Downloads the artifacts of a completed batch run and computes the tree
# statistics tables. Trigger manually with the batch run id, or automatically
# when a batch run finishes.
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "batch.yml run id to aggregate"
        required: true
  workflow_run:
    workflows: ["batch"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Resolve batch run id
        id: rid
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "id=${{ inputs.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download batch artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          gh run download "${{ steps.rid.outputs.id }}" \
            --repo "${{ github.repository }}" --dir artifacts
          echo "Downloaded:"; find artifacts -maxdepth 2 -type d | sort

      - name: Aggregate
        run: |
          python scripts/aggregate_trees.py --runs-dir artifacts --out stats

      - name: Write job summary
        run: cat stats/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload statistics bundle
        uses: actions/upload-artifact@v4
        with:
          name: diagnosis-statistics
          path: stats
          retention-days: 30
